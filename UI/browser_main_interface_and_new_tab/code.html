<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Browser Interface</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=Audiowide&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "future": ["Audiowide", "cursive"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                    backdropBlur: {
                        xs: '2px',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #101622; 
        }
        ::-webkit-scrollbar-thumb {
            background: #282e39; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3c4453; 
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(19, 91, 236, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(19, 91, 236, 0.15);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden h-screen flex flex-col">
<!-- Background Decoration -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/20 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-500/10 blur-[100px]"></div>
</div>
<!-- Browser Chrome (Top Bar) -->
<header class="relative z-50 flex flex-col w-full bg-[#111318]/90 backdrop-blur-md border-b border-[#282e39] shadow-lg">
<!-- Tab Strip & Window Controls -->
<div class="flex items-end px-2 pt-2 gap-2 h-10 select-none">
<!-- Traffic Lights -->
<div class="flex items-center gap-2 px-3 pb-2">
<div class="w-3 h-3 rounded-full bg-red-500"></div>
<div class="w-3 h-3 rounded-full bg-yellow-500"></div>
<div class="w-3 h-3 rounded-full bg-green-500"></div>
</div>
<!-- Tabs -->
<div class="flex flex-1 gap-1 overflow-x-auto no-scrollbar items-end h-full">
<!-- Active Tab -->
<div class="group relative flex items-center gap-2 px-4 py-2 min-w-[160px] max-w-[240px] h-full bg-[#282e39] rounded-t-lg text-white text-xs font-medium border-t border-x border-[#3c4453]/50">
<span class="material-symbols-outlined text-[16px] text-primary">public</span>
<span class="truncate flex-1">New Tab</span>
<button class="opacity-0 group-hover:opacity-100 hover:bg-white/10 rounded p-0.5 transition-opacity">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
<!-- Active Indicator -->
<div class="absolute bottom-0 left-0 right-0 h-[2px] bg-primary"></div>
</div>
<!-- Inactive Tab -->
<div class="group relative flex items-center gap-2 px-4 py-2 min-w-[160px] max-w-[240px] h-full hover:bg-[#282e39]/50 rounded-t-lg text-slate-400 hover:text-white text-xs font-medium transition-colors">
<span class="material-symbols-outlined text-[16px]">description</span>
<span class="truncate flex-1">Documentation</span>
<button class="opacity-0 group-hover:opacity-100 hover:bg-white/10 rounded p-0.5 transition-opacity">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<!-- Inactive Tab -->
<div class="group relative flex items-center gap-2 px-4 py-2 min-w-[160px] max-w-[240px] h-full hover:bg-[#282e39]/50 rounded-t-lg text-slate-400 hover:text-white text-xs font-medium transition-colors">
<span class="material-symbols-outlined text-[16px]">flutter_dash</span>
<span class="truncate flex-1">Twitter</span>
<button class="opacity-0 group-hover:opacity-100 hover:bg-white/10 rounded p-0.5 transition-opacity">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<!-- New Tab Button -->
<button class="flex items-center justify-center w-8 h-8 hover:bg-[#282e39]/50 rounded-lg text-slate-400 hover:text-white transition-colors mb-1 ml-1">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
<!-- Navigation & Omnibox -->
<div class="flex items-center gap-3 px-4 py-2 bg-[#111318] border-t border-[#282e39]">
<!-- Nav Controls -->
<div class="flex items-center gap-1 text-slate-400">
<button class="p-1.5 hover:bg-[#282e39] rounded-lg transition-colors hover:text-white disabled:opacity-50">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
</button>
<button class="p-1.5 hover:bg-[#282e39] rounded-lg transition-colors hover:text-white disabled:opacity-50" disabled="">
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="p-1.5 hover:bg-[#282e39] rounded-lg transition-colors hover:text-white">
<span class="material-symbols-outlined text-[20px]">refresh</span>
</button>
</div>
<!-- Omnibox -->
<div class="flex-1 max-w-3xl mx-auto">
<div class="group relative flex items-center w-full h-9 bg-[#1c212b] border border-[#282e39] rounded-full px-3 focus-within:ring-2 focus-within:ring-primary/50 focus-within:border-primary transition-all shadow-inner">
<span class="material-symbols-outlined text-[#135bec] text-[18px] mr-2">lock</span>
<span class="text-slate-500 text-sm mr-1 group-focus-within:hidden">https://</span>
<input class="flex-1 bg-transparent border-none p-0 text-sm text-white placeholder-slate-500 focus:ring-0" placeholder="Search or type a URL" type="text" value="google.com/search?q=glassmorphism"/>
<div class="flex items-center gap-1 ml-2">
<button class="p-1 hover:bg-[#282e39] rounded-full text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">star</span>
</button>
</div>
</div>
</div>
<!-- Extension Area & Menu -->
<div class="flex items-center gap-2 pl-2 border-l border-[#282e39]">
<button class="p-1.5 hover:bg-[#282e39] rounded-lg text-slate-400 hover:text-white transition-colors relative">
<span class="material-symbols-outlined text-[20px]">extension</span>
<span class="absolute top-1 right-1 w-2 h-2 bg-primary rounded-full border border-[#111318]"></span>
</button>
<button class="flex items-center gap-2 px-3 py-1.5 bg-[#135bec] hover:bg-[#135bec]/90 text-white rounded-lg text-xs font-bold tracking-wide transition-colors">
<span class="material-symbols-outlined text-[16px]">account_circle</span>
<span>Sign In</span>
</button>
<button class="p-1.5 hover:bg-[#282e39] rounded-lg text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[20px]">more_vert</span>
</button>
</div>
</div>
</header>
<!-- Main Content Area (New Tab Page) -->
<main class="relative z-10 flex-1 overflow-y-auto w-full flex flex-col items-center justify-center p-8">
<div class="w-full max-w-4xl flex flex-col items-center gap-10 animate-[fadeIn_0.6s_ease-out]">
<!-- Hero Section -->
<div class="text-center space-y-4">
<h1 class="font-future text-5xl md:text-7xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                    Good Evening
                </h1>
<h2 class="font-future text-2xl md:text-3xl text-primary font-medium tracking-wide drop-shadow-[0_0_10px_rgba(19,91,236,0.6)]">
                    20:42 PM
                </h2>
</div>
<!-- Main Search -->
<div class="w-full max-w-2xl relative group">
<div class="absolute -inset-0.5 bg-gradient-to-r from-primary to-purple-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
<div class="relative flex items-center w-full h-14 bg-[#1c212b]/80 backdrop-blur-xl border border-[#3c4453] rounded-2xl px-5 shadow-2xl">
<span class="material-symbols-outlined text-slate-400 text-[24px]">search</span>
<input class="w-full h-full bg-transparent border-none text-lg text-white placeholder-slate-500 focus:ring-0 ml-3" placeholder="Search the web..." type="text"/>
<button class="p-2 hover:bg-[#3c4453] rounded-lg text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[20px]">mic</span>
</button>
</div>
</div>
<!-- Quick Links Grid -->
<div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-4 w-full px-4">
<!-- Link Item -->
<a class="glass-card flex flex-col items-center justify-center gap-3 p-4 rounded-xl group cursor-pointer" href="#">

</div>
<span class="text-xs font-medium text-slate-300 group-hover:text-white">GitHub</span>
</a>
<!-- Link Item -->
<a class="glass-card flex flex-col items-center justify-center gap-3 p-4 rounded-xl group cursor-pointer" href="#">
<div class="w-12 h-12 rounded-full bg-[#282e39] flex items-center justify-center text-white shadow-lg group-hover:bg-[#FF0000] transition-colors">
<svg aria-hidden="true" class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path clip-rule="evenodd" d="M19.812 5.418c.861.23 1.538.907 1.768 1.768C21.998 8.746 22 12 22 12s0 3.255-.418 4.814a2.504 2.504 0 0 1-1.768 1.768c-1.56.419-7.814.419-7.814.419s-6.255 0-7.814-.419a2.505 2.505 0 0 1-1.768-1.768C2 15.255 2 12 2 12s0-3.255.418-4.814a2.507 2.507 0 0 1 1.768-1.768C5.744 5 11.998 5 11.998 5s6.255 0 7.814.418ZM15.194 12 10 15V9l5.194 3Z" fill-rule="evenodd"></path></svg>
</div>
<span class="text-xs font-medium text-slate-300 group-hover:text-white">YouTube</span>
</a>
<!-- Link Item -->
<a class="glass-card flex flex-col items-center justify-center gap-3 p-4 rounded-xl group cursor-pointer" href="#">
<div class="w-12 h-12 rounded-full bg-[#282e39] flex items-center justify-center text-white shadow-lg group-hover:bg-[#F24E1E] transition-colors">
<svg aria-hidden="true" class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path clip-rule="evenodd" d="M12 2H8.5c-1.84 0-3.33 1.5-3.33 3.33 0 1.84 1.5 3.33 3.33 3.33H12C13.84 8.66 15.33 7.16 15.33 5.33S13.84 2 12 2zm0 6.66c-1.84 0-3.33 1.5-3.33 3.33 0 1.84 1.5 3.33 3.33 3.33 1.84 0 3.33-1.5 3.33-3.33 0-1.84-1.5-3.33-3.33-3.33zM5.17 12c-1.84 0-3.33 1.5-3.33 3.33 0 1.84 1.5 3.33 3.33 3.33h3.33V12h-3.33zm6.83 10c1.84 0 3.33-1.5 3.33-3.33v-3.33H12v3.33c0 1.84 1.5 3.33 3.33 3.33zm6.66-6.66c1.84 0 3.33-1.5 3.33-3.33s-1.5-3.33-3.33-3.33c-1.84 0-3.33 1.5-3.33 3.33s1.5 3.33 3.33 3.33z" fill-rule="evenodd"></path></svg>
</div>
<span class="text-xs font-medium text-slate-300 group-hover:text-white">Figma</span>
</a>
<!-- Link Item -->
<a class="glass-card flex flex-col items-center justify-center gap-3 p-4 rounded-xl group cursor-pointer" href="#">
<div class="w-12 h-12 rounded-full bg-[#282e39] flex items-center justify-center text-white shadow-lg group-hover:bg-[#ea4c89] transition-colors">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path d="M12 24C5.385 24 0 18.615 0 12S5.385 0 12 0s12 5.385 12 12-5.385 12-12 12zm10.12-10.358c-.35-.11-3.17-.953-6.384-.438 1.34 3.684 1.887 6.684 1.992 7.308 2.573-1.724 4.298-4.665 4.392-6.87zm-6.688 8.016c-.086-.444-.555-3.094-1.748-6.505-3.193 1.053-6.023 3.235-7.55 5.513 2.378 2.067 5.56 3.01 8.87 1.256.16-.086.305-.164.428-.264zm-10.976-.595c1.45-2.096 4.093-4.113 7.072-5.117-1.168-2.617-2.42-4.832-2.912-5.63-3.834 1.636-6.262 5.257-6.52 9.07 1.04 1.026 1.708 1.396 2.36 1.677zm-1.07-10.43c.312-.047 2.65-.366 5.378.36 1.233-2.222 2.253-4.103 2.57-4.733-3.662-.738-7.234.61-9.456 3.324 1.066.868 1.508 1.049 1.508 1.049zm13.257-1.424c-.453.86-1.576 2.906-2.933 5.26 3.16.275 6.327 1.536 7.973 2.457-.234-3.525-2.22-6.522-5.04-7.717z"></path></svg>
</div>
<span class="text-xs font-medium text-slate-300 group-hover:text-white">Dribbble</span>
</a>
<!-- Link Item -->
<a class="glass-card flex flex-col items-center justify-center gap-3 p-4 rounded-xl group cursor-pointer" href="#">
<div class="w-12 h-12 rounded-full bg-[#282e39] flex items-center justify-center text-white shadow-lg group-hover:bg-[#000000] group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-[28px]">receipt_long</span>
</div>
<span class="text-xs font-medium text-slate-300 group-hover:text-white">Notion</span>
</a>
<!-- Link Item -->
<a class="glass-card flex flex-col items-center justify-center gap-3 p-4 rounded-xl group cursor-pointer" href="#">
<div class="w-12 h-12 rounded-full bg-[#282e39] flex items-center justify-center text-white shadow-lg group-hover:bg-[#5E6AD2] transition-colors">
<span class="material-symbols-outlined text-[28px]">timeline</span>
</div>
<span class="text-xs font-medium text-slate-300 group-hover:text-white">Linear</span>
</a>
</div>
<!-- Customizer Widget -->
<div class="fixed bottom-6 right-6">
<button class="flex items-center gap-2 px-4 py-2 bg-[#1c212b]/90 backdrop-blur-md text-white rounded-full shadow-2xl border border-[#3c4453] hover:border-primary hover:text-primary transition-all">
<span class="material-symbols-outlined text-[20px]">tune</span>
<span class="text-sm font-medium">Customize</span>
</button>
</div>
</div>
</main>
</body></html>
